<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI写作评估平台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <main class="layout">
        <aside class="sidebar">
          <section class="panel panel-input">
            <div class="panel-head">
              <div>
                <h1>AI写作评估平台</h1>
              </div>
            </div>

            <label class="field">
              <span>作文题目</span>
              <input id="topicInput" type="text" placeholder="自由填写作文题目；也可以留空。">
            </label>

            <div id="dropzone" class="dropzone" tabindex="0">
              <input id="fileInput" type="file" accept=".txt,.pdf" hidden>
              <p>拖拽或点击选择 <code>txt/pdf</code></p>
              <p class="muted">也可以直接粘贴英文作文。</p>
            </div>

            <label class="field">
              <span>作文文本</span>
              <textarea id="essayInput" rows="14" placeholder="在这里粘贴英文作文文本"></textarea>
            </label>

            <div class="mini-stats" id="essayStats">当前尚未加载作文。</div>

            <div class="actions">
              <button id="objectiveButton" class="secondary-button" type="button">客观特征分析</button>
              <button id="gradeButton" class="primary-button" type="button">七维度主观评分</button>
              <button id="exportButton" class="ghost-button" type="button" disabled>导出 JSON</button>
            </div>
          </section>

          <section class="panel panel-config">
            <div class="panel-head">
              <h2>AI 老师</h2>
              <div class="panel-actions">
                <button id="addTeacherButton" class="ghost-button" type="button">新增</button>
                <button id="resetTeachersButton" class="ghost-button" type="button">恢复</button>
              </div>
            </div>

            <div id="teachersContainer" class="teacher-list"></div>
          </section>
        </aside>

        <section class="workspace">
          <section class="panel panel-results">
            <div class="tabs">
              <button class="tab-button active" type="button" data-tab="objective">客观特征</button>
              <button class="tab-button" type="button" data-tab="subjective">主观评分</button>
              <button class="tab-button" type="button" data-tab="chat">继续追问</button>
            </div>

            <div id="errorBanner" class="error-banner hidden"></div>

            <div id="objectivePane" class="tab-pane active">
              <div class="panel-head">
                <h2>客观语言特征</h2>
                <span id="objectiveMeta" class="muted">可独立运行，无需加载 AI 老师。</span>
              </div>
              <div id="objectiveIntro" class="objective-intro"></div>
              <div id="objectiveResults" class="metric-grid"></div>
            </div>

            <div id="subjectivePane" class="tab-pane">
              <div class="panel-head">
                <h2>七维度主观评分</h2>
                <span id="resultMeta" class="muted">等待评分</span>
              </div>
              <div id="aggregateCard" class="aggregate-card hidden"></div>
              <div id="teacherResults" class="teacher-results"></div>
            </div>

            <div id="chatPane" class="tab-pane chat-pane">
              <div class="panel-head">
                <h2>继续和 AI 老师讨论</h2>
                <span id="chatMeta" class="muted">评分后会自动带入评价上下文。</span>
              </div>
              <div id="chatMessages" class="chat-messages"></div>
              <div class="chat-compose">
                <textarea id="chatInput" rows="3" placeholder="例如：请帮我把第二段论证改得更有逻辑。"></textarea>
                <button id="chatButton" class="primary-button" type="button">发送</button>
              </div>
            </div>
          </section>

          <section class="panel panel-notes">
            <div class="panel-head">
              <h2>使用提示</h2>
              <span class="muted">先分析，再评分，再追问。</span>
            </div>
            <div class="usage-notes">
              <p>客观特征分析可以独立运行；主观评分时，AI 老师会同时看到这些客观特征、七维度评分标准和作文全文。</p>
              <p>评分完成后，可以继续让老师解释扣分原因、改写段落或给出下一轮写作计划。</p>
            </div>
          </section>
        </section>
      </main>
    </div>

    <template id="teacherTemplate">
      <article class="teacher-card">
        <div class="teacher-head">
          <h3>老师</h3>
          <button class="ghost-button remove-teacher" type="button">删除</button>
        </div>
        <div class="teacher-grid">
          <label class="field">
            <span>名称</span>
            <input data-key="name" type="text" placeholder="Method Teacher">
          </label>
          <label class="field">
            <span>模型</span>
            <input data-key="model" type="text" placeholder="gpt-5.4">
          </label>
          <label class="field teacher-grid-wide">
            <span>Base URL</span>
            <input data-key="base_url" type="text" placeholder="https://api.openai.com/v1">
          </label>
          <label class="field">
            <span>API Key</span>
            <input data-key="api_key" type="password" placeholder="留空则读取环境变量">
          </label>
          <label class="field">
            <span>环境变量名</span>
            <input data-key="api_key_env" type="text" placeholder="OPENAI_API_KEY">
          </label>
          <label class="field">
            <span>Temperature</span>
            <input data-key="temperature" type="number" min="0" max="2" step="0.1">
          </label>
          <label class="field teacher-grid-wide">
            <span>额外请求体 JSON</span>
            <textarea data-key="extra_body" rows="3" placeholder='例如 {"max_completion_tokens": 1200}'></textarea>
          </label>
        </div>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
  </html>
